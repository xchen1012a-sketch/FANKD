spring.application.name=fankeda
spring.config.import=optional:file:./config/application-local.properties
spring.datasource.url=${FANKEDA_DB_URL:jdbc:mysql://localhost:3306/fankeda?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${FANKEDA_DB_USERNAME:root}
spring.datasource.password=${FANKEDA_DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
